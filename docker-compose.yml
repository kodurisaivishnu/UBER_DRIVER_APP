services:
  nginx:
    build: ./nginx-app
    ports:
      - "80:80"
    depends_on:
      auth-service:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    env_file: .env
    volumes:
      - auth-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8081/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      start_period: 15s

volumes:
  auth-logs:
