events {}

http {
    # Rate limiting: 5 requests/sec per client IP, 10MB shared memory zone
    limit_req_zone $binary_remote_addr zone=ip_rate_limit:10m rate=5r/s;

    # ---------------------------------------------------------------
    # Upstream blocks for backend services (load balanced: least_conn)
    # Replace the placeholder 127.0.0.1 entries with real service URLs.
    # ---------------------------------------------------------------

    upstream api_backend {
        least_conn;
        # server api-service-1.example.com:8080;
        # server api-service-2.example.com:8080;
        server 127.0.0.1:8080;  # placeholder - replace with real URL
    }

    upstream auth_backend {
        least_conn;
        server uber-auth-service-1.onrender.com:443;
    }

    upstream websocket_backend {
        least_conn;
        # server ws-service-1.example.com:8082;
        # server ws-service-2.example.com:8082;
        server 127.0.0.1:8082;  # placeholder - replace with real URL
    }

    server {
        listen 80;

        root /usr/share/nginx/html;

        # disable ALL caching
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires 0;
        etag off;

        error_page 404 /404.html;
        error_page 429 /429.html;
        error_page 502 503 504 /error.html;

        location / {
            limit_req zone=ip_rate_limit burst=10 nodelay;
            limit_req_status 429;
            try_files $uri $uri/ =404;
        }

        location = /404.html {
            internal;
        }

        location = /429.html {
            internal;
        }

        location = /error.html {
            internal;
        }

        location /health {
            return 200 "OK";
        }

        # ---------------------------------------------------------------
        # Backend proxy locations
        # Uncomment proxy_pass lines when backends are live.
        # Rate limiting is applied to each backend route.
        # ---------------------------------------------------------------

        location /api/ {
            limit_req zone=ip_rate_limit burst=10 nodelay;
            limit_req_status 429;
            # proxy_pass http://api_backend/;
            # proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr;
            # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # proxy_set_header X-Forwarded-Proto $scheme;
            return 503;  # remove when api_backend is live
        }

        location /auth/ {
            limit_req zone=ip_rate_limit burst=10 nodelay;
            limit_req_status 429;
            proxy_pass https://uber-auth-service-1.onrender.com/;
            proxy_ssl_server_name on;
            proxy_set_header Host uber-auth-service-1.onrender.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cookie $http_cookie;
            proxy_pass_header Set-Cookie;
        }

        location /ws/ {
            # proxy_pass http://websocket_backend/;
            # proxy_http_version 1.1;
            # proxy_set_header Upgrade $http_upgrade;
            # proxy_set_header Connection "upgrade";
            # proxy_set_header Host $host;
            # proxy_set_header X-Real-IP $remote_addr;
            return 503;  # remove when websocket_backend is live
        }
    }
}
