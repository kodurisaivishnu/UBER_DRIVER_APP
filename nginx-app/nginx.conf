events {}

http {
    server {
        listen 80;

        root /usr/share/nginx/html;

        error_page 404 /404.html;
        error_page 502 503 504 /error.html;

        location / {
            try_files $uri $uri/ =404;
        }

        location = /404.html {
            internal;
        }

        location = /error.html {
            internal;
        }

        location /health {
            return 200 "OK";
        }
    }
}